{% extends 'base.html' %}
{% block content %}
<div class="row">
    <div class="col-md-7">
        <div class="card p-4">
            <h4 class="fw-bold mb-4">{{ title }}</h4>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">{{ field.label }}</label>
                    {{ field }}
                    {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
                </div>
                {% endfor %}
                <button class="btn btn-primary">Save Team</button>
                <a href="{% url 'team_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
