{% extends "admin/base.html" %}

{% block title %}SKY Portal Admin{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}">🛰️ SKY Admin</a>
</h1>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
    /* ── Tokens ── */
    :root {
        --navy:      #0d1b2a;
        --navy-mid:  #1b2e45;
        --navy-lite: #243b55;
        --accent:    #2f80ed;
        --accent-hov:#1a6fd4;
        --white:     #ffffff;
        --off-white: #f0f4f8;
        --border:    #d1dce8;
        --text:      #1a2b3c;
        --muted:     #6b7f93;
        --success:   #27ae60;
        --danger:    #e74c3c;
    }

    /* ── Global ── */
    body {
        font-family: 'Inter', 'Segoe UI', sans-serif;
        background: var(--off-white);
        color: var(--text);
    }

    /* ── Header ── */
    #header {
        background: var(--navy) !important;
        padding: 14px 24px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }
    #header a, #header a:visited {
        color: var(--white) !important;
        text-decoration: none;
    }
    #site-name a {
        font-size: 1.2rem;
        font-weight: 700;
        letter-spacing: 0.5px;
        color: var(--white) !important;
    }
    #user-tools {
        font-size: 0.8rem;
        color: rgba(255,255,255,0.75) !important;
    }
    #user-tools a {
        color: var(--white) !important;
        border-bottom: 1px solid rgba(255,255,255,0.3);
        padding-bottom: 1px;
    }

    /* ── Breadcrumbs ── */
    div.breadcrumbs {
        background: var(--navy-mid) !important;
        color: rgba(255,255,255,0.7) !important;
        padding: 10px 24px;
        font-size: 0.8rem;
    }
    div.breadcrumbs a {
        color: rgba(255,255,255,0.85) !important;
    }

    /* ── Sidebar / nav ── */
    #nav-sidebar, .toggle-nav-sidebar {
        background: var(--navy-lite) !important;
        border-right: 1px solid rgba(255,255,255,0.08);
    }
    #nav-sidebar a {
        color: rgba(255,255,255,0.85) !important;
    }
    #nav-sidebar a:hover {
        color: var(--white) !important;
        background: rgba(47,128,237,0.2) !important;
    }
    .current-app .section:first-child,
    .current-app .app-icon {
        color: var(--accent) !important;
    }

    /* ── Content ── */
    #content {
        padding: 24px;
    }
    #content h1 {
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 20px;
    }

    /* ── Modules / cards ── */
    .module {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 10px;
        box-shadow: 0 1px 6px rgba(0,0,0,0.06);
        margin-bottom: 20px;
        overflow: hidden;
    }
    .module h2, .module caption {
        background: var(--navy-mid) !important;
        color: var(--white) !important;
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        padding: 10px 16px;
        text-transform: uppercase;
    }
    .module table {
        width: 100%;
        border-collapse: collapse;
    }

    /* ── Tables ── */
    #result_list thead th {
        background: var(--navy) !important;
        color: var(--white) !important;
        font-size: 0.78rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 12px 16px;
        border: none;
    }
    #result_list thead th a {
        color: var(--white) !important;
    }
    #result_list tbody tr:nth-child(odd) {
        background: var(--off-white);
    }
    #result_list tbody tr:hover {
        background: #e3ecf8;
    }
    #result_list td {
        padding: 11px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 0.88rem;
    }

    /* ── Buttons ── */
    .button, input[type=submit], input[type=button],
    .submit-row input, a.button {
        background: var(--accent) !important;
        color: var(--white) !important;
        border: none !important;
        border-radius: 6px !important;
        padding: 8px 18px !important;
font-size: 0.85rem !important;
        font-weight: 600 !important;
        cursor: pointer;
        transition: background 0.2s;
    }
    .button:hover, input[type=submit]:hover {
        background: var(--accent-hov) !important;
    }
    .button.default, input[type=submit].default {
        background: var(--navy) !important;
    }
    .deletelink, a.deletelink {
        background: var(--danger) !important;
        color: var(--white) !important;
        border-radius: 6px;
        padding: 6px 14px;
    }

    /* ── Forms ── */
    .form-row {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
    }
    input[type=text], input[type=email], input[type=password],
    input[type=number], select, textarea {
        border: 1px solid var(--border) !important;
        border-radius: 6px !important;
        padding: 7px 10px !important;
        font-size: 0.88rem !important;
        width: 100%;
        transition: border 0.2s;
    }
    input:focus, select:focus, textarea:focus {
        border-color: var(--accent) !important;
        outline: none !important;
        box-shadow: 0 0 0 3px rgba(47,128,237,0.15) !important;
    }

    /* ── Messages ── */
    .messagelist li {
        border-radius: 6px;
        padding: 10px 16px;
        margin-bottom: 8px;
        font-size: 0.88rem;
    }
    .messagelist li.success { background: #d4edda; color: #155724; }
    .messagelist li.error   { background: #f8d7da; color: #721c24; }
    .messagelist li.warning { background: #fff3cd; color: #856404; }

    /* ── Dashboard app list ── */
    .app-sky_portal .section { border-left: 3px solid var(--accent); }

    /* ── Pagination ── */
    .paginator {
        font-size: 0.85rem;
        color: var(--muted);
        padding: 12px 16px;
    }
    .paginator a {
        color: var(--accent);
        font-weight: 600;
    }
</style>
{% endblock %}
