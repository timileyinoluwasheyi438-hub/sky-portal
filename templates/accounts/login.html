{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card p-4">
            <h4 class="text-center mb-4"><i class="fas fa-satellite-dish text-primary me-2"></i>SKY Portal</h4>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">{{ field.label }}</label>
                    {{ field }}
                    {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
                </div>
                {% endfor %}
                <button class="btn btn-primary w-100 mt-2">Sign In</button>
            </form>
            <p class="text-center mt-3 small">No account? <a href="{% url 'register' %}">Register here</a></p>
        </div>
    </div>
</div>
{% endblock %}
